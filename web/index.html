<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nCore Film Downloader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .controls {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
    }

    .search-box input {
      width: 100%;
      padding: 10px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    .search-box input:focus {
      outline: none;
      border-color: #667eea;
    }

    .filter-group {
      display: flex;
      gap: 10px;
    }

    .filter-btn {
      padding: 10px 15px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.3s;
    }

    .filter-btn:hover {
      border-color: #667eea;
    }

    .filter-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .stats {
      color: #666;
      font-size: 0.9em;
    }

    .films-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .film-card {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .film-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
    }

    .film-poster {
      width: 100%;
      height: 200px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3em;
      color: #ddd;
      overflow: hidden;
    }

    .film-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .film-info {
      padding: 15px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .film-title {
      font-size: 1.1em;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
      line-height: 1.4;
      min-height: 2.8em;
    }

    .film-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 0.85em;
      color: #666;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
    }

    .meta-label {
      font-weight: 600;
      color: #999;
      font-size: 0.75em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .meta-value {
      color: #333;
    }

    .imdb-rating {
      background: #f8b500;
      color: #000;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 600;
      display: inline-block;
      width: fit-content;
    }

    .film-size {
      background: #e0e0e0;
      padding: 2px 6px;
      border-radius: 3px;
      display: inline-block;
      width: fit-content;
    }

    .film-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e0e0e0;
    }

    .download-btn {
      flex: 1;
      padding: 10px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
      text-align: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: 0.95em;
    }

    .download-btn:hover {
      background: #5568d3;
    }

    .copy-btn {
      padding: 10px 15px;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .copy-btn:hover {
      background: #e0e0e0;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: white;
      font-size: 1.2em;
    }

    .error {
      background: #ff6b6b;
      color: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
    }

    .empty {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 8px;
      color: #999;
      font-size: 1.1em;
    }

    .footer {
      text-align: center;
      color: white;
      font-size: 0.9em;
      margin-top: 40px;
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 1.8em;
      }

      .controls {
        flex-direction: column;
      }

      .filter-group {
        width: 100%;
      }

      .films-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎬 nCore Film Downloader</h1>
      <p>Browse and download HD films to your Synology</p>
    </header>

    <div class="controls">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search films by name..." />
      </div>
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="hun">Hungarian</button>
        <button class="filter-btn" data-filter="en">English</button>
      </div>
      <div class="stats">
        <span id="filmCount">0</span> films
      </div>
    </div>

    <div id="content"></div>

    <div class="footer">
      <p>Last updated: <span id="lastUpdate">--</span></p>
      <p>Data from nCore Download Manager</p>
    </div>
  </div>

  <script>
    const GITHUB_JSON_URL = 'https://ncorescraper.github.io/output/ncore-films.json';

    let allFilms = [];
    let currentFilter = 'all';

    async function loadFilms() {
      const content = document.getElementById('content');
      try {
        content.innerHTML = '<div class="loading">Loading films...</div>';

        const response = await fetch(GITHUB_JSON_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        allFilms = await response.json();
        document.getElementById('lastUpdate').textContent = new Date().toLocaleString();

        renderFilms();
      } catch (error) {
        console.error('Error loading films:', error);
        content.innerHTML = `
          <div class="error">
            <strong>Error loading films:</strong> ${error.message}
            <p style="margin-top: 10px; font-size: 0.9em;">Make sure the JSON URL is accessible</p>
          </div>
        `;
      }
    }

    function filterFilms() {
      let filtered = allFilms;

      if (currentFilter !== 'all') {
        filtered = filtered.filter(film => {
          const title = film.filmTitle?.toLowerCase() || '';
          if (currentFilter === 'hun') {
            return !title.includes('english') && !title.includes('(en)');
          } else if (currentFilter === 'en') {
            return title.includes('english') || title.includes('(en)');
          }
          return true;
        });
      }

      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      if (searchTerm) {
        filtered = filtered.filter(film =>
          (film.filmTitle?.toLowerCase() || '').includes(searchTerm) ||
          (film.imdbUrl?.toLowerCase() || '').includes(searchTerm)
        );
      }

      return filtered;
    }

    function renderFilms() {
      const filtered = filterFilms();
      const content = document.getElementById('content');
      document.getElementById('filmCount').textContent = filtered.length;

      if (filtered.length === 0) {
        content.innerHTML = '<div class="empty">No films found. Try adjusting your search or filters.</div>';
        return;
      }

      content.innerHTML = `<div class="films-grid">${filtered.map(film => createFilmCard(film)).join('')}</div>`;

      // Add event listeners
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const link = e.target.dataset.link;
          navigator.clipboard.writeText(link).then(() => {
            e.target.textContent = 'Copied!';
            setTimeout(() => { e.target.textContent = 'Copy'; }, 2000);
          });
        });
      });
    }

    function createFilmCard(film) {
      const title = film.filmTitle || 'Unknown';
      const date = film.uploadDate || 'N/A';
      const size = film.fileSize || 'N/A';
      const imdb = film.imdbRating ? `${film.imdbRating}/10` : 'N/A';
      const poster = film.posterUrl || '';
      const downloadLink = film.downloadLink || '#';

      const posterHtml = poster
        ? `<img src="${poster}" alt="${title}" onerror="this.style.display='none'">`
        : '🎬';

      return `
        <div class="film-card">
          <div class="film-poster">${posterHtml}</div>
          <div class="film-info">
            <div class="film-title">${escapeHtml(title)}</div>
            <div class="film-meta">
              <div class="meta-item">
                <span class="meta-label">Date</span>
                <span class="meta-value">${date}</span>
              </div>
              <div class="meta-item">
                <span class="meta-label">Size</span>
                <span class="meta-value">${size}</span>
              </div>
              <div class="meta-item">
                <span class="meta-label">IMDB</span>
                <span class="meta-value">
                  ${film.imdbRating ? `<span class="imdb-rating">${imdb}</span>` : 'N/A'}
                </span>
              </div>
            </div>
            <div class="film-actions">
              <a href="${downloadLink}" class="download-btn" target="_blank" rel="noopener noreferrer">
                ⬇️ Download
              </a>
              <button class="copy-btn" data-link="${escapeHtml(downloadLink)}">Copy</button>
            </div>
          </div>
        </div>
      `;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Event listeners
    document.getElementById('searchInput').addEventListener('input', renderFilms);

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter = e.target.dataset.filter;
        renderFilms();
      });
    });

    // Load films on page load
    loadFilms();

    // Refresh every 30 minutes
    setInterval(loadFilms, 30 * 60 * 1000);
  </script>
</body>
</html>
